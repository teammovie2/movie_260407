{% extends 'base.html' %}

{% block title %}
    공지사항 - 필름아티크
{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/question_list.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='faq.css') }}">
{% endblock %}

{% block content %}

<div class="container">
    <h5 class="my-3 border-bottom pb-2">답변 수정</h5>
    <form method="post">
        {{ form.csrf_token }}
        {% include 'form_errors.html' %}

        {{ form.content.label }}
        {{ form.content(class="form-control mb-3", row="10") }}

        <button type="submit" class="btn btn-primary">저장하기</button>
    </form>
</div>
{% endblock %}
