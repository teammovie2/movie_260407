{% extends 'base.html' %}

{% block title %}
성인 인증
{% endblock %}

{% block content %}

<style>
/* 전체 배경 */
body{
    background:#000;
    color:#fff;
    font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
}

/* 메인 영역 */
.adult-wrap{
    width:1207px;
    margin:0 auto;
    padding:80px 0 120px;
    min-height:700px;
}

/* 카드 박스 */
.adult-box{
    width:700px;
    margin:0 auto;
    background:#111;
    border:1px solid #333;
    border-radius:12px;
    padding:60px 50px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* 아이콘 */
.adult-icon{
    width:90px;
    height:90px;
    line-height:90px;
    border-radius:50%;
    background:#b91c1c;
    font-size:40px;
    font-weight:bold;
    margin:0 auto 30px;
}

/* 제목 */
.adult-title{
    font-size:34px;
    font-weight:700;
    margin-bottom:20px;
}

/* 설명 */
.adult-desc{
    color:#bbb;
    font-size:16px;
    line-height:1.8;
    margin-bottom:35px;
}

/* 정보 박스 */
.info-box{
    background:#1a1a1a;
    border-radius:10px;
    padding:25px;
    margin-bottom:35px;
    text-align:left;
}

.info-box p{
    margin:8px 0;
    color:#ddd;
}

/* 버튼 영역 */
.btn-area{
    display:flex;
    justify-content:center;
    gap:15px;
}

/* 버튼 공통 */
.btn-custom{
    width:180px;
    padding:14px 0;
    border-radius:8px;
    font-size:16px;
    font-weight:700;
    text-decoration:none;
    transition:0.3s;
}

/* 인증 버튼 */
.btn-auth{
    background:#b91c1c;
    color:#fff;
}

.btn-auth:hover{
    background:#991b1b;
    color:#fff;
}

/* 취소 버튼 */
.btn-cancel{
    background:#333;
    color:#fff;
}

.btn-cancel:hover{
    background:#555;
    color:#fff;
}
</style>

<div class="adult-wrap">

    <div class="adult-box">

        <div class="adult-icon">19</div>

        <div class="adult-title">
            성인 인증이 필요합니다
        </div>

        <div class="adult-desc">
            선택하신 영화는 <strong>청소년 관람불가</strong> 등급입니다.<br>
            안전한 예매 진행을 위해 회원정보 기준 성인 인증이 필요합니다.
        </div>

        <div class="info-box">
            <p>✔ 회원가입 시 등록한 생년월일 정보를 기준으로 인증됩니다.</p>
            <p>✔ 만 19세 이상 회원만 예매 가능합니다.</p>
            <p>✔ 인증 완료 후 예매 페이지로 이동합니다.</p>
        </div>

        <div class="btn-area">

            <a href="{{ url_for('film.booking_pass') }}" class="btn-custom btn-auth">
                성인 인증 진행
            </a>

            <a href="{{ url_for('main.index') }}" class="btn-custom btn-cancel">
                취소
            </a>

        </div>

    </div>

</div>

{% endblock %}
